<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WordPill — Админ</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --p: #a855f7; --p2: #7c3aed;
  --bg: #09090f; --bg2: #111118; --bg3: #18181f;
  --border: rgba(168,85,247,.15); --border2: rgba(255,255,255,.06);
  --text: #f0f0f8; --muted: #6b6b80; --muted2: #9090a8;
  --success: #34d399; --danger: #f87171; --warn: #fbbf24;
  --glow: rgba(168,85,247,.35);
}
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
body { font-family:'Inter',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
body::before {
  content:''; position:fixed; inset:0; z-index:0; pointer-events:none;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  opacity:.3;
}
.bg-glow {
  position:fixed; top:-300px; left:50%; transform:translateX(-50%);
  width:800px; height:600px;
  background:radial-gradient(ellipse,rgba(168,85,247,.1),transparent 65%);
  pointer-events:none; z-index:0;
}

/* LOCK SCREEN */
#lockScreen {
  position:fixed; inset:0; z-index:500;
  display:flex; align-items:center; justify-content:center;
  background:var(--bg);
}
.lock-card {
  background:var(--bg2); border:1px solid var(--border2);
  border-radius:28px; padding:48px 40px; width:380px; text-align:center;
}
.lock-icon { font-size:48px; margin-bottom:16px; }
.lock-title { font-family:'Syne',sans-serif; font-size:22px; font-weight:800; margin-bottom:8px; }
.lock-sub { font-size:13px; color:var(--muted2); margin-bottom:28px; line-height:1.6; }
.lock-input {
  width:100%; padding:14px 16px; background:var(--bg3);
  border:1.5px solid var(--border2); border-radius:14px;
  font-family:'Inter',sans-serif; font-size:16px; color:var(--text);
  outline:none; text-align:center; letter-spacing:3px;
  margin-bottom:14px; transition:border-color .2s;
}
.lock-input:focus { border-color:var(--p); }
.lock-error { font-size:12px; color:var(--danger); margin-top:-8px; margin-bottom:12px; min-height:16px; }

/* NAV */
nav {
  padding:0 40px; height:64px;
  display:flex; align-items:center; justify-content:space-between;
  background:rgba(9,9,15,.85); backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border2);
  position:sticky; top:0; z-index:100;
}
.nav-logo {
  font-family:'Syne',sans-serif; font-size:18px; font-weight:800;
  background:linear-gradient(135deg,#fff 30%,var(--p));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  display:flex; align-items:center; gap:8px;
}
.nav-badge {
  display:flex; align-items:center; gap:6px;
  background:rgba(248,113,113,.1); border:1px solid rgba(248,113,113,.2);
  border-radius:100px; padding:4px 12px;
  font-size:11px; font-weight:700; color:var(--danger);
}

main { max-width:900px; margin:0 auto; padding:40px; position:relative; z-index:1; }

/* STATS */
.stats-row { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; margin-bottom:36px; }
.stat-card {
  background:var(--bg2); border:1px solid var(--border2);
  border-radius:20px; padding:22px 24px;
}
.stat-val { font-family:'Syne',sans-serif; font-size:28px; font-weight:800; color:var(--p); }
.stat-label { font-size:12px; color:var(--muted); margin-top:6px; }

/* SECTION */
.section-head {
  display:flex; align-items:center; justify-content:space-between; margin-bottom:16px;
}
.section-title { font-family:'Syne',sans-serif; font-size:16px; font-weight:800; }

/* BTN */
.btn {
  display:inline-flex; align-items:center; gap:6px;
  padding:9px 18px; border-radius:12px; border:none;
  font-family:'Inter',sans-serif; font-size:13px; font-weight:600;
  cursor:pointer; transition:transform .15s, box-shadow .15s;
}
.btn:active { transform:scale(.97); }
.btn-primary { background:linear-gradient(135deg,var(--p),var(--p2)); color:#fff; box-shadow:0 4px 20px var(--glow); }
.btn-primary:hover { box-shadow:0 6px 28px var(--glow); transform:translateY(-1px); }
.btn-ghost { background:var(--bg3); border:1px solid var(--border2); color:var(--muted2); }
.btn-ghost:hover { border-color:var(--border); color:var(--text); }
.btn-danger { background:rgba(248,113,113,.1); border:1px solid rgba(248,113,113,.2); color:var(--danger); }
.btn-sm { padding:6px 12px; font-size:11px; border-radius:8px; }

/* TEACHERS LIST */
.teacher-card {
  background:var(--bg2); border:1px solid var(--border2);
  border-radius:20px; padding:22px 24px; margin-bottom:12px;
  display:flex; align-items:center; gap:20px;
  transition:border-color .2s;
}
.teacher-card:hover { border-color:var(--border); }
.teacher-avatar {
  width:44px; height:44px; border-radius:50%;
  background:rgba(168,85,247,.15); color:var(--p);
  display:flex; align-items:center; justify-content:center;
  font-family:'Syne',sans-serif; font-size:16px; font-weight:800; flex-shrink:0;
}
.teacher-info { flex:1; min-width:0; }
.teacher-name { font-size:15px; font-weight:700; margin-bottom:2px; }
.teacher-meta { font-size:12px; color:var(--muted); }
.teacher-link-wrap {
  display:flex; align-items:center; gap:8px;
  background:var(--bg3); border:1px solid var(--border2);
  border-radius:12px; padding:8px 14px;
  font-size:11px; color:var(--muted2); font-family:monospace;
  max-width:320px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  flex:1;
}
.copy-btn {
  background:none; border:none; cursor:pointer; color:var(--p);
  font-size:14px; padding:4px; transition:transform .15s; flex-shrink:0;
}
.copy-btn:active { transform:scale(.85); }
.teacher-actions { display:flex; gap:8px; flex-shrink:0; }

/* MODAL */
.modal-overlay {
  position:fixed; inset:0; z-index:200;
  background:rgba(0,0,0,.7); backdrop-filter:blur(8px);
  display:flex; align-items:center; justify-content:center;
  opacity:0; pointer-events:none; transition:opacity .2s;
}
.modal-overlay.open { opacity:1; pointer-events:all; }
.modal {
  background:var(--bg2); border:1px solid var(--border2);
  border-radius:28px; padding:36px; width:480px; max-width:90vw;
  transform:translateY(20px) scale(.97); transition:transform .25s; position:relative;
}
.modal-overlay.open .modal { transform:translateY(0) scale(1); }
.modal-title { font-family:'Syne',sans-serif; font-size:20px; font-weight:800; margin-bottom:8px; }
.modal-sub { font-size:13px; color:var(--muted2); margin-bottom:28px; line-height:1.6; }
.modal-close {
  position:absolute; top:20px; right:20px;
  width:32px; height:32px; border-radius:50%;
  background:var(--bg3); border:1px solid var(--border2);
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; color:var(--muted); font-size:14px;
}
.modal-close:hover { color:var(--text); }
.form-group { margin-bottom:18px; }
.form-label {
  font-size:11px; font-weight:700; text-transform:uppercase;
  letter-spacing:1.2px; color:var(--muted); margin-bottom:8px; display:block;
}
.form-input {
  width:100%; background:var(--bg3); border:1.5px solid var(--border2);
  border-radius:12px; padding:12px 14px;
  font-family:'Inter',sans-serif; font-size:14px; color:var(--text);
  outline:none; transition:border-color .2s;
}
.form-input:focus { border-color:var(--p); }
.modal-actions { display:flex; gap:10px; justify-content:flex-end; margin-top:24px; }

/* RESULT CARD */
.result-card {
  background:rgba(52,211,153,.08); border:1px solid rgba(52,211,153,.2);
  border-radius:16px; padding:20px; margin-top:20px; display:none;
}
.result-label { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:1px; color:var(--success); margin-bottom:8px; }
.result-link {
  font-family:monospace; font-size:12px; color:var(--text);
  background:var(--bg3); border:1px solid var(--border2);
  border-radius:10px; padding:10px 14px; word-break:break-all;
  margin-bottom:12px;
}

/* TOAST */
.toast {
  position:fixed; bottom:32px; right:32px; z-index:300;
  background:var(--bg2); border:1px solid var(--border2);
  border-radius:16px; padding:14px 20px;
  display:flex; align-items:center; gap:10px;
  font-size:14px; font-weight:500;
  transform:translateY(80px); opacity:0;
  transition:transform .3s, opacity .3s;
  box-shadow:0 12px 40px rgba(0,0,0,.4);
}
.toast.show { transform:translateY(0); opacity:1; }

.divider { height:1px; background:var(--border2); margin:36px 0; }
.empty { text-align:center; padding:48px; color:var(--muted); font-size:14px; }
</style>
</head>
<body>
<div class="bg-glow"></div>

<!-- LOCK SCREEN -->
<div id="lockScreen">
  <div class="lock-card">
    <div class="lock-icon">🔐</div>
    <div class="lock-title">Вход в админ-панель</div>
    <div class="lock-sub">Введи пароль администратора WordPill</div>
    <input type="password" class="lock-input" id="lockInput" placeholder="••••••" onkeydown="if(event.key==='Enter')checkPassword()">
    <div class="lock-error" id="lockError"></div>
    <button class="btn btn-primary" style="width:100%" onclick="checkPassword()">Войти →</button>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none">
  <nav>
    <div class="nav-logo">💊 <span>WordPill Admin</span></div>
    <div class="nav-badge">🔴 Только для администратора</div>
  </nav>

  <main>
    <div class="stats-row" id="statsRow"></div>

    <div class="section-head">
      <div class="section-title">👨‍🏫 Преподаватели</div>
      <button class="btn btn-primary" onclick="openModal('modalCreate')">+ Добавить преподавателя</button>
    </div>

    <div id="teachersList"></div>
  </main>
</div>

<!-- Modal: Create Teacher -->
<div class="modal-overlay" id="modalCreate">
  <div class="modal">
    <div class="modal-close" onclick="closeModal('modalCreate')">✕</div>
    <div class="modal-title">Новый преподаватель</div>
    <div class="modal-sub">Система сгенерирует уникальную ссылку которую ты отправишь преподавателю.</div>

    <div class="form-group">
      <label class="form-label">Имя преподавателя</label>
      <input type="text" class="form-input" id="newTeacherName" placeholder="Например: Анна Смирнова">
    </div>
    <div class="form-group">
      <label class="form-label">Telegram ID (необязательно)</label>
      <input type="text" class="form-input" id="newTeacherTgId" placeholder="Например: 291442252">
    </div>

    <div class="result-card" id="resultCard">
      <div class="result-label">✓ Преподаватель создан — скопируй ссылку</div>
      <div class="result-link" id="resultLink"></div>
      <button class="btn btn-primary" style="width:100%" onclick="copyResultLink()">📋 Скопировать ссылку</button>
    </div>

    <div class="modal-actions" id="createActions">
      <button class="btn btn-ghost" onclick="closeModal('modalCreate')">Отмена</button>
      <button class="btn btn-primary" onclick="doCreateTeacher()">Создать →</button>
    </div>
  </div>
</div>

<div class="toast" id="toast">
  <span id="toastIcon">✓</span>
  <span id="toastMsg"></span>
</div>

<script>
const SUPABASE_URL = 'https://sqwnkjpflxskrmwladyn.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNxd25ranBmbHhza3Jtd2xhZHluIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwNzY4MzAsImV4cCI6MjA5MjY1MjgzMH0.6jmgEf6aN0yCsr75gqlk2RxjWA2vjsIkhsCiLck4Cws';
const ADMIN_PASSWORD = 'wordpill2026';
const BASE_URL = location.origin + location.pathname.replace('admin.html', 'teacher.html');

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
let teachers = [];

// ─── AUTH ───
function checkPassword() {
  const val = document.getElementById('lockInput').value;
  if (val === ADMIN_PASSWORD) {
    document.getElementById('lockScreen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    loadAll();
  } else {
    document.getElementById('lockError').textContent = 'Неверный пароль';
    document.getElementById('lockInput').value = '';
    document.getElementById('lockInput').focus();
  }
}

// ─── LOAD ───
async function loadAll() {
  const { data: ts } = await sb.from('teachers').select('*').order('created_at', { ascending: false });
  teachers = ts || [];

  // Student counts per teacher
  const { data: links } = await sb.from('teacher_students').select('teacher_id');
  const counts = {};
  (links || []).forEach(l => { counts[l.teacher_id] = (counts[l.teacher_id] || 0) + 1; });

  // Total users
  const { data: users } = await sb.from('users').select('id');
  const linked = new Set((links || []).map(l => l.user_id));
  const freeCount = (users || []).filter(u => !linked.has(u.id)).length;

  renderStats(teachers.length, (users||[]).length, freeCount);
  renderTeachers(counts);
}

function renderStats(teachersCount, totalUsers, freeCount) {
  document.getElementById('statsRow').innerHTML = `
    <div class="stat-card"><div class="stat-val">${teachersCount}</div><div class="stat-label">Преподавателей</div></div>
    <div class="stat-card"><div class="stat-val">${totalUsers}</div><div class="stat-label">Всего учеников в системе</div></div>
    <div class="stat-card"><div class="stat-val">${freeCount}</div><div class="stat-label">Без преподавателя</div></div>
  `;
}

function renderTeachers(counts) {
  const el = document.getElementById('teachersList');
  if (!teachers.length) {
    el.innerHTML = `<div class="empty">Преподавателей пока нет. Добавь первого!</div>`;
    return;
  }
  el.innerHTML = teachers.map(t => {
    const initials = t.name.split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();
    const link = `${BASE_URL}?token=${t.token}`;
    const studentCount = counts[t.id] || 0;
    return `
      <div class="teacher-card">
        <div class="teacher-avatar">${initials}</div>
        <div class="teacher-info">
          <div class="teacher-name">${t.name}</div>
          <div class="teacher-meta">${studentCount} учеников · создан ${new Date(t.created_at).toLocaleDateString('ru')}</div>
        </div>
        <div class="teacher-link-wrap" title="${link}">
          ${link}
        </div>
        <button class="copy-btn" onclick="copyLink('${link}')" title="Скопировать ссылку">📋</button>
        <div class="teacher-actions">
          <button class="btn btn-danger btn-sm" onclick="deleteTeacher(${t.id}, '${t.name.replace(/'/g,"\\'")}')">Удалить</button>
        </div>
      </div>
    `;
  }).join('');
}

// ─── CREATE TEACHER ───
async function doCreateTeacher() {
  const name = document.getElementById('newTeacherName').value.trim();
  if (!name) { toast('❗', 'Введи имя преподавателя'); return; }
  const tgId = document.getElementById('newTeacherTgId').value.trim();

  const { data, error } = await sb.from('teachers').insert({
    name,
    telegram_id: tgId ? parseInt(tgId) : null,
  }).select().single();

  if (error || !data) { toast('❌', 'Ошибка создания'); return; }

  const link = `${BASE_URL}?token=${data.token}`;
  document.getElementById('resultLink').textContent = link;
  document.getElementById('resultCard').style.display = 'block';
  document.getElementById('createActions').style.display = 'none';

  await loadAll();
  toast('✅', `Преподаватель "${name}" создан`);
}

let resultLinkVal = '';
function copyResultLink() {
  const link = document.getElementById('resultLink').textContent;
  navigator.clipboard.writeText(link);
  toast('📋', 'Ссылка скопирована');
}

// ─── DELETE TEACHER ───
async function deleteTeacher(id, name) {
  if (!confirm(`Удалить преподавателя "${name}"?\nЕго ученики станут свободными.`)) return;
  await sb.from('teachers').delete().eq('id', id);
  await loadAll();
  toast('🗑️', `${name} удалён`);
}

// ─── UTILS ───
function copyLink(link) {
  navigator.clipboard.writeText(link);
  toast('📋', 'Ссылка скопирована');
}

function openModal(id) {
  if (id === 'modalCreate') {
    document.getElementById('newTeacherName').value = '';
    document.getElementById('newTeacherTgId').value = '';
    document.getElementById('resultCard').style.display = 'none';
    document.getElementById('createActions').style.display = 'flex';
  }
  document.getElementById(id).classList.add('open');
}
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

document.querySelectorAll('.modal-overlay').forEach(el => {
  el.addEventListener('click', e => { if (e.target === el) el.classList.remove('open'); });
});

let toastTimer;
function toast(icon, msg) {
  document.getElementById('toastIcon').textContent = icon;
  document.getElementById('toastMsg').textContent = msg;
  const el = document.getElementById('toast');
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
}
</script>
</body>
</html>

name: WordPill Daily Reminders

on:
  schedule:
    # Каждый день в 18:00 по Москве (15:00 UTC)
    - cron: '0 15 * * *'
  workflow_dispatch: # Позволяет запустить вручную для теста

jobs:
  send-reminders:
    runs-on: ubuntu-latest

    steps:
      - name: Send reminders to inactive users
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          python3 << 'EOF'
          import urllib.request
          import urllib.parse
          import json
          import os
          from datetime import datetime, timezone

          TELEGRAM_TOKEN = os.environ['TELEGRAM_BOT_TOKEN']
          SUPABASE_URL   = os.environ['SUPABASE_URL']
          SUPABASE_KEY   = os.environ['SUPABASE_SERVICE_KEY']
          TODAY          = datetime.now(timezone.utc).strftime('%Y-%m-%d')

          # ── Получаем пользователей которые не заходили сегодня ──────────
          url = f"{SUPABASE_URL}/rest/v1/users?select=id,chat_id,first_name,streak_days,last_study_date&last_study_date=neq.{TODAY}"
          req = urllib.request.Request(url, headers={
              'apikey':        SUPABASE_KEY,
              'Authorization': f'Bearer {SUPABASE_KEY}',
              'Content-Type':  'application/json'
          })

          try:
              with urllib.request.urlopen(req) as resp:
                  users = json.loads(resp.read())
          except Exception as e:
              print(f"Ошибка получения пользователей: {e}")
              users = []

          print(f"Пользователей для напоминания: {len(users)}")

          # ── Сообщения ────────────────────────────────────────────────────
          def get_message(user):
              name = user.get("first_name") or "Привет"
              return f"💊 {name}, твой прогресс в WordPill ждёт тебя. Зайди и повтори слова."

          # ── Отправляем сообщения ─────────────────────────────────────────
          sent  = 0
          failed = 0

          for user in users:
              chat_id = user.get('chat_id')
              if not chat_id:
                  print(f"  Нет chat_id для user {user.get('id')}, пропускаем")
                  continue

              text = get_message(user)
              payload = json.dumps({
                  'chat_id':    chat_id,
                  'text':       text,
                  'parse_mode': 'HTML'
              }).encode()

              tg_url = f"https://api.telegram.org/bot{TELEGRAM_TOKEN}/sendMessage"
              tg_req = urllib.request.Request(tg_url, data=payload, headers={
                  'Content-Type': 'application/json'
              })

              try:
                  with urllib.request.urlopen(tg_req) as resp:
                      result = json.loads(resp.read())
                      if result.get('ok'):
                          print(f"  ✅ Отправлено: {user.get('first_name')} (chat_id: {chat_id})")
                          sent += 1
                      else:
                          print(f"  ❌ Ошибка для {user.get('first_name')}: {result}")
                          failed += 1
              except Exception as e:
                  print(f"  ❌ Исключение для {user.get('first_name')}: {e}")
                  failed += 1

          print(f"\nГотово: отправлено {sent}, ошибок {failed}")
          EOF

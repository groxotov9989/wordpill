name: WordPill Daily Reminders

on:
  schedule:
    # Каждый день в 18:00 по Москве (15:00 UTC)
    - cron: '0 15 * * *'
  workflow_dispatch: # Позволяет запустить вручную для теста

jobs:
  send-reminders:
    runs-on: ubuntu-latest

    steps:
      - name: Send reminders to inactive users
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          python3 << 'EOF'
          import urllib.request
          import urllib.error
          import json
          import os
          import time
          from datetime import datetime, timezone

          TELEGRAM_TOKEN = os.environ['TELEGRAM_BOT_TOKEN']
          SUPABASE_URL   = os.environ['SUPABASE_URL']
          SUPABASE_KEY   = os.environ['SUPABASE_SERVICE_KEY']
          TODAY          = datetime.now(timezone.utc).strftime('%Y-%m-%d')

          # ── Fetch users who haven't studied today ────────────────────────
          url = (f"{SUPABASE_URL}/rest/v1/users"
                 f"?select=id,chat_id,first_name,streak_days,last_study_date"
                 f"&last_study_date=neq.{TODAY}"
                 f"&chat_id=not.is.null")
          req = urllib.request.Request(url, headers={
              'apikey':        SUPABASE_KEY,
              'Authorization': f'Bearer {SUPABASE_KEY}',
              'Content-Type':  'application/json'
          })

          try:
              with urllib.request.urlopen(req) as resp:
                  users = json.loads(resp.read())
          except Exception as e:
              print(f"Ошибка получения пользователей: {e}")
              users = []

          print(f"Пользователей для напоминания: {len(users)}")

          def get_message(user):
              name = user.get("first_name") or "Привет"
              streak = user.get("streak_days") or 0
              if streak >= 3:
                  return f"💊 {name}, не прерывай серию — уже {streak} дней подряд! Зайди и повтори слова."
              return f"💊 {name}, твой прогресс в WordPill ждёт тебя. Зайди и повтори слова."

          def send_message(chat_id, text, max_retries=3):
              """Send one message with exponential backoff on 429."""
              payload = json.dumps({
                  'chat_id':    chat_id,
                  'text':       text,
                  'parse_mode': 'HTML'
              }).encode()
              tg_url = f"https://api.telegram.org/bot{TELEGRAM_TOKEN}/sendMessage"
              for attempt in range(max_retries):
                  req = urllib.request.Request(tg_url, data=payload,
                                               headers={'Content-Type': 'application/json'})
                  try:
                      with urllib.request.urlopen(req) as resp:
                          result = json.loads(resp.read())
                          return result.get('ok', False), None
                  except urllib.error.HTTPError as e:
                      body = {}
                      try:
                          body = json.loads(e.read())
                      except Exception:
                          pass
                      if e.code == 429:
                          retry_after = body.get('parameters', {}).get('retry_after', 2 ** attempt)
                          print(f"    429 rate-limited, waiting {retry_after}s …")
                          time.sleep(retry_after)
                          continue
                      # 400/403 = bad chat_id or bot blocked — don't retry
                      return False, f"HTTP {e.code}: {body}"
                  except Exception as ex:
                      if attempt < max_retries - 1:
                          time.sleep(2 ** attempt)
                          continue
                      return False, str(ex)
              return False, "max retries exceeded"

          # ── Send messages — 1 msg/sec to stay inside Telegram limits ─────
          SEND_INTERVAL = 1.0   # seconds between messages (≤1 msg/sec per chat)
          BURST_SIZE    = 25    # send in bursts of 25, then pause
          BURST_PAUSE   = 2.0   # extra pause between bursts (global 30/sec headroom)

          sent = 0
          failed = 0

          for i, user in enumerate(users):
              chat_id = user.get('chat_id')
              if not chat_id:
                  continue

              ok, err = send_message(chat_id, get_message(user))
              if ok:
                  print(f"  ✅ {user.get('first_name')} ({chat_id})")
                  sent += 1
              else:
                  print(f"  ❌ {user.get('first_name')} ({chat_id}): {err}")
                  failed += 1

              # Rate limiting: sleep between every message
              time.sleep(SEND_INTERVAL)
              # Extra pause every BURST_SIZE messages
              if (i + 1) % BURST_SIZE == 0:
                  print(f"  … пауза после {i+1} сообщений …")
                  time.sleep(BURST_PAUSE)

          print(f"\nГотово: отправлено {sent}, ошибок {failed}")
          EOF
